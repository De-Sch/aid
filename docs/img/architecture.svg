<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="AID2.0 architecture: a layered hexagonal daemon. Requests flow down through listeners, controllers, use cases, domain and the ports seam; dlopen'd adapter plugins implement the ports and do the outside I/O to OpenProject and DaviCal; live ticket deltas are pushed back to the dashboard over WebSocket and OpenProject edits return via a webhook.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowPush" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/>
    </marker>
    <!-- hollow triangle = UML "realizes / implements" -->
    <marker id="realize" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M0,1 L11,6 L0,11 Z" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
    </marker>
  </defs>

  <!-- painted background so the figure is legible in both light and dark GitHub themes -->
  <rect x="0" y="0" width="1200" height="880" fill="#ffffff"/>

  <text x="600" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">AID2.0 — architecture at a glance</text>
  <text x="600" y="54" text-anchor="middle" font-size="13" fill="#64748b">Phone events in, tickets out. Hexagonal: the core talks to ports; dlopen'd adapters do the real I/O. No database of its own.</text>

  <!-- ============ top actors ============ -->
  <rect x="70" y="76" width="360" height="50" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="250" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Phone system</text>
  <text x="250" y="115" text-anchor="middle" font-size="12" fill="#475569">Asterisk AMI &#8594; calls.py &#8212; POST /call</text>

  <rect x="750" y="76" width="360" height="50" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="930" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Operator dashboard</text>
  <text x="930" y="115" text-anchor="middle" font-size="12" fill="#475569">Browser &#8212; REST + WebSocket on /ui/*</text>

  <!-- ============ daemon container ============ -->
  <rect x="40" y="150" width="1110" height="568" rx="12" fill="#fcfdff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="58" y="172" font-size="13" font-weight="700" fill="#334155">AID2.0 daemon &#183; single long-lived process &#183; request flows top &#8594; bottom, each layer depends only downward</text>

  <!-- listeners (Drogon zone) -->
  <rect x="70" y="186" width="1040" height="38" rx="7" fill="#fff4e6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">Drogon HTTP + WebSocket listeners &#183; bind 127.0.0.1 and lanInterface on listenPort</text>

  <!-- controllers (Drogon zone) -->
  <rect x="70" y="240" width="1040" height="64" rx="7" fill="#fff4e6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="82" y="258" font-size="12" font-weight="700" fill="#7c2d12">Controllers &#183; JSON &#8596; domain types, no business logic  (SessionGuard = filter)</text>
  <g font-size="11.5" fill="#7c2d12">
    <rect x="82"  y="268" width="130" height="28" rx="5" fill="#ffffff" stroke="#f59e0b"/><text x="147" y="286" text-anchor="middle">CallController</text>
    <rect x="220" y="268" width="150" height="28" rx="5" fill="#ffffff" stroke="#f59e0b"/><text x="295" y="286" text-anchor="middle">WebhookController</text>
    <rect x="378" y="268" width="110" height="28" rx="5" fill="#ffffff" stroke="#f59e0b"/><text x="433" y="286" text-anchor="middle">UiController</text>
    <rect x="496" y="268" width="150" height="28" rx="5" fill="#ffffff" stroke="#f59e0b"/><text x="571" y="286" text-anchor="middle">UiStreamController</text>
    <rect x="654" y="268" width="130" height="28" rx="5" fill="#ffffff" stroke="#f59e0b"/><text x="719" y="286" text-anchor="middle">HealthController</text>
    <rect x="792" y="268" width="120" height="28" rx="5" fill="#ffffff" stroke="#f59e0b"/><text x="852" y="286" text-anchor="middle">LoginController</text>
    <rect x="920" y="268" width="130" height="28" rx="5" fill="#ffffff" stroke="#f59e0b"/><text x="985" y="286" text-anchor="middle">SessionGuard</text>
  </g>

  <!-- use cases (plugin-safe core) -->
  <rect x="70" y="322" width="1040" height="42" rx="7" fill="#eef6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="590" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Use cases &#183; 10 orchestrators (HandleIncomingCall &#8230; CloseTicket &#183; GetDashboard &#183; TicketDeltaEmitter)</text>

  <!-- domain (plugin-safe core) -->
  <rect x="70" y="384" width="1040" height="40" rx="7" fill="#eef6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="590" y="401" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a8a">Domain &#183; pure business rules</text>
  <text x="590" y="417" text-anchor="middle" font-size="11.5" fill="#1e40af">CallTracker &#183; CallLineFormatter &#183; TicketRouter &#183; StateTransitions</text>

  <!-- ports seam (plugin-safe core, dashed = the extension boundary) -->
  <rect x="70" y="440" width="1040" height="48" rx="7" fill="#eef6ff" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="590" y="460" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a8a">Ports &#183; abstract interfaces &#8212; the extension seam (the core only ever calls these)</text>
  <text x="590" y="478" text-anchor="middle" font-size="11.5" fill="#1e40af">TicketStore &#183; AddressBook &#183; UiNotifier</text>

  <!-- adapters implementing the ports -->
  <rect x="70" y="520" width="330" height="76" rx="7" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="235" y="542" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">aid_openproject_plugin.so</text>
  <text x="235" y="561" text-anchor="middle" font-size="11.5" fill="#047857">implements TicketStore</text>
  <text x="235" y="579" text-anchor="middle" font-size="10.5" fill="#059669">dlopen'd &#183; extern "C" factory</text>

  <rect x="420" y="520" width="330" height="76" rx="7" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="585" y="542" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">aid_davical_plugin.so</text>
  <text x="585" y="561" text-anchor="middle" font-size="11.5" fill="#047857">implements AddressBook</text>
  <text x="585" y="579" text-anchor="middle" font-size="10.5" fill="#059669">dlopen'd &#183; extern "C" factory</text>

  <rect x="780" y="520" width="330" height="76" rx="7" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="945" y="542" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f766e">WsHubAdapter</text>
  <text x="945" y="561" text-anchor="middle" font-size="11.5" fill="#0d9488">implements UiNotifier</text>
  <text x="945" y="579" text-anchor="middle" font-size="10.5" fill="#0d9488">in-process (not a .so)</text>

  <!-- infrastructure / crosscutting + auth -->
  <rect x="70" y="616" width="700" height="86" rx="7" fill="#fff4e6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="82" y="636" font-size="12" font-weight="700" fill="#7c2d12">Infrastructure &amp; crosscutting &#183; process-model glue, used by every layer (may use Drogon)</text>
  <text x="82" y="656" font-size="11.5" fill="#7c2d12">Wal &#183; MailboxEngine (Mailbox / WebhookMailbox) &#183; PluginLoader (loads the .so's) &#183; HttpClient</text>
  <text x="82" y="674" font-size="11.5" fill="#7c2d12">HealthService &#183; MembershipReconciler &#183; Config &#183; Logger &#183; Clock &#183; CorrelationId</text>
  <text x="82" y="692" font-size="10.5" fill="#9a3412">Domain-loop workers drain per-callid mailboxes in order; different callids run in parallel.</text>

  <rect x="790" y="616" width="320" height="86" rx="7" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="950" y="636" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Auth &#183; dashboard logins</text>
  <text x="950" y="656" text-anchor="middle" font-size="11.5" fill="#6d28d9">AuthService &#183; SessionRepo &#183; UserRepo</text>
  <text x="950" y="676" text-anchor="middle" font-size="11.5" fill="#6d28d9">local SQLite auth.db</text>
  <text x="950" y="694" text-anchor="middle" font-size="10.5" fill="#7c3aed">the only DB the daemon owns</text>

  <!-- ============ bottom external services ============ -->
  <rect x="70" y="764" width="330" height="52" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="235" y="786" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">OpenProject</text>
  <text x="235" y="804" text-anchor="middle" font-size="12" fill="#475569">tickets (REST) + outbound webhook</text>

  <rect x="420" y="764" width="330" height="52" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="585" y="786" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">DaviCal / CardDAV</text>
  <text x="585" y="804" text-anchor="middle" font-size="12" fill="#475569">contact lookup by phone number</text>

  <!-- ============ inbound request flow (solid, downward) ============ -->
  <g stroke="#475569" stroke-width="1.7" fill="none">
    <!-- actors into the listeners -->
    <line x1="250" y1="126" x2="250" y2="184" marker-end="url(#arrow)"/>
    <line x1="930" y1="126" x2="930" y2="184" marker-end="url(#arrow)"/>
    <!-- spine: down through the layers -->
    <line x1="590" y1="224" x2="590" y2="238" marker-end="url(#arrow)"/>
    <line x1="590" y1="304" x2="590" y2="320" marker-end="url(#arrow)"/>
    <line x1="590" y1="364" x2="590" y2="382" marker-end="url(#arrow)"/>
    <line x1="590" y1="424" x2="590" y2="438" marker-end="url(#arrow)"/>
    <!-- adapters out to the external systems -->
    <line x1="235" y1="596" x2="235" y2="762" marker-end="url(#arrow)"/>
    <line x1="585" y1="596" x2="585" y2="762" marker-end="url(#arrow)"/>
  </g>

  <!-- ============ realization: each adapter implements a port (dashed, hollow triangle up into the seam) ============ -->
  <g stroke="#2563eb" stroke-width="1.5" fill="none" stroke-dasharray="5 3">
    <line x1="235" y1="518" x2="235" y2="490" marker-end="url(#realize)"/>
    <line x1="585" y1="518" x2="585" y2="490" marker-end="url(#realize)"/>
    <line x1="945" y1="518" x2="945" y2="490" marker-end="url(#realize)"/>
  </g>

  <!-- ============ webhook return path: OpenProject edit -> WebhookController (dashed purple, up the left margin) ============ -->
  <path d="M70,782 L26,782 L26,232 L295,232 L295,266" stroke="#8b5cf6" stroke-width="1.6" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowDash)"/>
  <text transform="rotate(-90 18 470)" x="18" y="470" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">ticket webhook &#8594; POST /hook/ticket</text>

  <!-- ============ live delta push: WsHubAdapter -> dashboard over WebSocket (teal, up the right margin) ============ -->
  <path d="M1110,540 L1174,540 L1174,100 L1112,100" stroke="#0d9488" stroke-width="1.6" fill="none" marker-end="url(#arrowPush)"/>
  <text transform="rotate(-90 1188 330)" x="1188" y="330" text-anchor="middle" font-size="11" fill="#0d9488" font-style="italic">live deltas &#8594; dashboard (WebSocket)</text>

  <!-- ============ legend ============ -->
  <g font-size="12" fill="#334155">
    <text x="40" y="852" font-weight="700">Zones:</text>
    <rect x="98" y="843" width="14" height="12" rx="2" fill="#eef6ff" stroke="#3b82f6"/><text x="118" y="853">Plugin-safe core (no Drogon)</text>
    <rect x="298" y="843" width="14" height="12" rx="2" fill="#fff4e6" stroke="#f59e0b"/><text x="318" y="853">Drogon zone (daemon only)</text>
    <rect x="492" y="843" width="14" height="12" rx="2" fill="#ecfdf5" stroke="#10b981"/><text x="512" y="853">Port plugin .so</text>
    <rect x="628" y="843" width="14" height="12" rx="2" fill="#faf5ff" stroke="#8b5cf6"/><text x="648" y="853">Auth (SQLite)</text>
    <rect x="738" y="843" width="14" height="12" rx="2" fill="#f1f5f9" stroke="#64748b"/><text x="758" y="853">External system</text>
  </g>
  <g font-size="11.5" fill="#475569">
    <text x="40" y="872" font-weight="700" fill="#334155">Arrows:</text>
    <line x1="98" y1="868" x2="128" y2="868" stroke="#475569" stroke-width="1.7" marker-end="url(#arrow)"/><text x="134" y="872">request flows down / calls out</text>
    <line x1="322" y1="868" x2="352" y2="868" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#realize)"/><text x="360" y="872">adapter implements port</text>
    <line x1="530" y1="868" x2="560" y2="868" stroke="#8b5cf6" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowDash)"/><text x="568" y="872">inbound webhook</text>
    <line x1="700" y1="868" x2="730" y2="868" stroke="#0d9488" stroke-width="1.6" marker-end="url(#arrowPush)"/><text x="738" y="872">live WebSocket deltas</text>
  </g>
</svg>
